services:
  - type: web
    name: crm-backend
    runtime: node
    plan: standard
    buildCommand: |
      chmod +x render-build.sh && ./render-build.sh && npm install
    startCommand: NODE_OPTIONS=--dns-result-order=ipv4first node -r dotenv/config server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: WHATSAPP_SESSION_PATH
        value: /opt/render/project/src/.whatsapp-session
    disk:
      name: whatsapp-session
      mountPath: /opt/render/project/src/.whatsapp-session
      sizeGB: 1
