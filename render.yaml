# 🚀 Render Blueprint - CRM Fono Inova v4.0
# Arquitetura: API + Workers separados por domínio (ledger + event-driven)
# Última atualização: 2026-04-16
#
# ⚠️ ARQUITETURA FUTURA — AINDA NÃO IMPLANTADA (confirmado em 2026-07-10).
# Produção hoje roda apenas 3 serviços (ver /render.yaml na raiz):
#   fono-inova-crm-back (web) + crm-worker (worker único) + redis-fono-inova
#   (Redis gerenciado pelo Render).
# O código já suporta isolamento lógico por domínio (billing/scheduling/
# clinical/whatsapp/reconciliation rodando dentro do mesmo crm-worker), mas o
# deploy físico em 5 workers separados descrito abaixo ainda não foi aplicado.
# Migrar para cá só quando o volume justificar o isolamento (ver decisão
# 2026-07-10: ganho pequeno hoje, custo/complexidade maior).
#
# Como usar (quando for migrar):
#   1. Configure MONGODB_URI, REDIS_URL e JWT_SECRET no dashboard do Render
#   2. Conecte este repo via "Blueprints" no Render
#   3. Cada serviço será provisionado automaticamente

services:
  # =========================
  # 🖥️ API CORE (sem workers)
  # =========================
  - type: web
    name: fono-inova-crm-api
    runtime: node
    plan: standard
    region: ohio
    branch: main
    rootDir: back
    buildCommand: npm ci --omit=optional && npm cache clean --force
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: ENABLE_WORKERS
        value: "false"
      - key: ENABLE_PROJECTIONS
        value: "true"
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_BASE_URL
        value: "https://fono-inova-crm-api.onrender.com"
    scaling:
      minInstances: 1
      maxInstances: 2
      targetCPUPercent: 70
      targetMemoryPercent: 80

  # =========================
  # ⚙️ WORKER: SCHEDULING
  # =========================
  - type: worker
    name: crm-worker-scheduling
    runtime: node
    plan: starter
    region: ohio
    branch: main
    rootDir: back
    buildCommand: npm ci --omit=optional && npm cache clean --force
    startCommand: node workers/entrypoints/scheduling-worker.js
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: ENABLE_WORKERS
        value: "true"
      - key: WORKER_GROUP
        value: scheduling
      - key: MONGODB_URI
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: MONGODB_URI
      - key: REDIS_URL
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: REDIS_URL
      - key: JWT_SECRET
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: JWT_SECRET
      - key: INTERNAL_BASE_URL
        value: "https://fono-inova-crm-api.onrender.com"

  # =========================
  # 💰 WORKER: BILLING + FINANCIAL LEDGER
  # =========================
  - type: worker
    name: crm-worker-billing
    runtime: node
    plan: starter
    region: ohio
    branch: main
    rootDir: back
    buildCommand: npm ci --omit=optional && npm cache clean --force
    startCommand: node workers/entrypoints/billing-worker.js
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: ENABLE_WORKERS
        value: "true"
      - key: WORKER_GROUP
        value: billing
      - key: MONGODB_URI
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: MONGODB_URI
      - key: REDIS_URL
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: REDIS_URL
      - key: JWT_SECRET
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: JWT_SECRET
      - key: INTERNAL_BASE_URL
        value: "https://fono-inova-crm-api.onrender.com"

  # =========================
  # 🏥 WORKER: CLINICAL
  # =========================
  - type: worker
    name: crm-worker-clinical
    runtime: node
    plan: starter
    region: ohio
    branch: main
    rootDir: back
    buildCommand: npm ci --omit=optional && npm cache clean --force
    startCommand: node workers/entrypoints/clinical-worker.js
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: ENABLE_WORKERS
        value: "true"
      - key: WORKER_GROUP
        value: clinical
      - key: MONGODB_URI
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: MONGODB_URI
      - key: REDIS_URL
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: REDIS_URL
      - key: JWT_SECRET
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: JWT_SECRET
      - key: INTERNAL_BASE_URL
        value: "https://fono-inova-crm-api.onrender.com"

  # =========================
  # 💬 WORKER: WHATSAPP / COMUNICAÇÃO
  # =========================
  - type: worker
    name: crm-worker-whatsapp
    runtime: node
    plan: standard
    region: ohio
    branch: main
    rootDir: back
    buildCommand: npm ci --omit=optional && node installChrome.js
    startCommand: node workers/entrypoints/whatsapp-only.js
    autoDeploy: false
    disk:
      name: whatsapp-session
      mountPath: /var/data/wwebjs_auth
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_WORKERS
        value: "true"
      - key: WORKER_GROUP
        value: whatsapp
      - key: WHATSAPP_AUTH_PATH
        value: "/var/data/wwebjs_auth"
      - key: MONGODB_URI
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: MONGODB_URI
      - key: REDIS_URL
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: REDIS_URL
      - key: JWT_SECRET
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: JWT_SECRET
      - key: INTERNAL_BASE_URL
        value: "https://fono-inova-crm-api.onrender.com"

  # =========================
  # 🔍 WORKER: RECONCILIATION + OUTBOX + FOLLOWUP + NOTIFICATION
  # =========================
  - type: worker
    name: crm-worker-reconciliation
    runtime: node
    plan: starter
    region: ohio
    branch: main
    rootDir: back
    buildCommand: npm ci --omit=optional && npm cache clean --force
    startCommand: node workers/entrypoints/reconciliation-worker.js
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: ENABLE_WORKERS
        value: "true"
      - key: WORKER_GROUP
        value: reconciliation
      - key: MONGODB_URI
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: MONGODB_URI
      - key: REDIS_URL
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: REDIS_URL
      - key: JWT_SECRET
        fromService:
          name: fono-inova-crm-api
          type: web
          envVarKey: JWT_SECRET
      - key: INTERNAL_BASE_URL
        value: "https://fono-inova-crm-api.onrender.com"

# 📝 Notas de deploy:
# - Cada worker group roda isolado em seu próprio processo
# - Ledger é populado pelo grupo billing (fonte única de verdade financeira)
# - Se um worker cair, os outros continuam operando
# - Escalar: aumente instâncias de grupos específicos conforme demanda
