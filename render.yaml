# 🚀 Render Blueprint - CRM Fono Inova
# Arquitetura: API separada de Workers (evita Redis overload)
# Deploy: conecte este repo no Render via Blueprint

services:
  # =========================
  # 🖥️ WEB API SERVICE
  # =========================
  - type: web
    name: fono-inova-crm-back
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_WORKERS
        value: "false"
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        sync: false
    autoDeploy: true

  # =========================
  # ⚙️ WORKER SERVICE (todos os workers)
  # =========================
  - type: worker
    name: crm-worker
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node workers/startWorkers.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_WORKERS
        value: "true"
      - key: WORKER_GROUP
        value: "all"
      - key: MONGODB_URI
        sync: false
      - key: INTERNAL_BASE_URL
        value: "https://fono-inova-crm-back.onrender.com"
    autoDeploy: true

